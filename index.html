<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CineBox</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link rel="shortcut icon" href="src/img/logo.ico" type="image/x-icon" />
        <link rel="stylesheet" href="./src/css/style.css" />
    </head>

    <body>
        <header>
            <nav>
                <a href="#" class="logo">
                    <img src="src/img/logo-black.ico" />
                    <h1>Cine Box</h1>
                </a>
                <ul class="menu">
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Filmes</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>

                <ul class="menu-icones">
                    <li>
                        <a href="#" class="active"><i class="bi bi-search"></i></a>
                    </li>
                    <li>
                        <a href="#"><i class="bi bi-heart"></i></a>
                    </li>
                    <li>
                        <a href="#"><i class="bi bi-cart"></i></a>
                    </li>
                    <li>
                        <a href="#"><i class="bi bi-person"></i></a>
                    </li>
                </ul>
            </nav>
        </header>
        <section id="banner">
            <main class="carrossel-container">
                <div class="carrossel">
                    <img src="./src/img/banner/banner_01.jpg" alt="banner 01" />
                    <img src="./src/img/banner/banner_02.jpg" alt="banner 02" />
                    <img src="./src/img/banner/banner_03.jpg" alt="banner 03" />
                    <img src="./src/img/banner/banner_04.jpg" alt="banner 04" />
                    <img src="./src/img/banner/banner_05.jpg" alt="banner 05" />
                    <img src="./src/img/banner/banner_06.jpg" alt="banner 06" />
                </div>
                <button class="prev" onclick="prevSlide()"><i class="bi bi-arrow-left"></i></button>
                <button class="next" onclick="nextSlide()">
                    <i class="bi bi-arrow-right"></i>
                </button>
                <ul class="dots">
                    <li class="active"></li>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </main>
        </section>
        <script src="src/js/script.js"></script>
    </body>
</html>
